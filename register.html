<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Acity Connect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <nav>
        <div class="logo">
            <img src="images/acity_new_logo-removebg-preview.png" alt="acity logo" width="50px">
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="create-listing.html">Add Item</a>
            <a href="profile.html">Profile</a>
            <a href="myCart.html">My Cart</a>
            

        </div>
    </nav>
   
    <div class="form-container">
        <h2>Register</h2>

        <form id="registerForm">
            <label for="fullName">Full Name: </label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your Acity email" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
            <button class="login-register" type="submit">Register</button>
        </form>

        <p>Already have an account? <a href="login.html">Login here</a></p>

    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
