<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Acity Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="auth-pages-background">
    <div class="auth-page">

    <div class="auth-left">

        <img
            src="images/acity_new_logo-removebg-preview.png"
            class="auth-logo"
            alt="Acity Connect"
        >

        <h1>
            Join Acity Connect 
        </h1>

        <p class="auth-subtitle">

            Your campus marketplace for buying, selling,
            services and student connections.

        </p>

        <div class="auth-features">

            <div>
                <i class="fa-solid fa-store"></i>
                Buy & Sell Safely
            </div>

            <div>
                <i class="fa-solid fa-screwdriver-wrench"></i>
                Offer Your Skills
            </div>

            <div>
                <i class="fa-solid fa-comments"></i>
                Message Students
            </div>

            <div>
                <i class="fa-solid fa-star"></i>
                Build Your Reputation
            </div>

        </div>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>Create Account</h2>

            <p>

                Join the Academic City community.

            </p>

            <form id="registerForm">

                <div class="input-group">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="fullName"
                        placeholder="Name"
                        required
                    >

                </div>

                <div class="input-group">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="student@acity.edu.gh"
                        required
                    >

                </div>

                

                <div class="input-group">

                    <i class="fa-solid fa-layer-group"></i>

                    <select id="level" required>

                        <option value="">
                            Select Level
                        </option>

                        <option>100</option>

                        <option>200</option>

                        <option>300</option>

                        <option>400</option>

                    </select>

                </div>

                <div class="input-group">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                    >

                    <button
                        type="button"
                        class="toggle-password"
                    >

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

                <div id="passwordStrength"></div>

                <div class="input-group">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required
                    >

                    <button
                        type="button"
                        class="toggle-password"
                    >
                        <i class="fa-solid fa-eye"></i>
                    </button>

                </div>

                <label class="terms">

                    <input
                        type="checkbox"
                        required
                    >

                    I agree to the Terms &
                    Privacy Policy

                </label>

                <button
                    class="auth-btn"
                    id="registerButton"
                    type="submit"
                >

                    Create Account

                </button>

            </form>

            <p class="switch-auth">

                Already have an account?

                <a href="login.html">

                    Sign In

                </a>

            </p>

        </div>

    </div>

</div>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
    
</body>
</html>
