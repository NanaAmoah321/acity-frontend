<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->

    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('config', 'G-B940J1CYHZ');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Acity Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="any">
    <link rel="apple-touch-icon" href="/favicon.png">
</head>
<body class="auth-pages-background">
    <div class="auth-page">
    <div class="auth-left">
        <img
            src="images/acity_new_logo-removebg-preview.png"
            class="auth-logo"
            alt="Acity Connect"
        >
        <h1>
            Join Acity Connect 
        </h1>
        <p class="auth-subtitle">
            Your campus marketplace for buying, selling,
            services and student connections.
        </p>
        <div class="auth-features">
            <div>
                <i class="fa-solid fa-store"></i>
                Buy & Sell Safely
            </div>
            <div>
                <i class="fa-solid fa-screwdriver-wrench"></i>
                Offer Your Skills
            </div>
            <div>
                <i class="fa-solid fa-comments"></i>
                Message Students
            </div>
            <div>
                <i class="fa-solid fa-star"></i>
                Build Your Reputation
            </div>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p>
                Join the Academic City community.
            </p>
            <form id="registerForm"  class="form">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input
                        type="text"
                        id="fullName"
                        placeholder="Name"
                        required
                    >
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                    >
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-layer-group"></i>
                    <select id="level" required>
                        <option value="">
                            Select Level
                        </option>
                        <option>100</option>
                        <option>200</option>
                        <option>300</option>
                        <option>400</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                    >
                    <button
                        type="button"
                        class="toggle-password"
                    >
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <div id="passwordStrength"  class="password-strength"></div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required
                    >
                    <button
                        type="button"
                        class="toggle-password"
                    >
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <div class="auth-options">

                    <label>

                        <input
                            type="checkbox"
                            id="receiveMarketplaceUpdates"
                        >

                        Email me when new marketplace items and services are posted.

                    </label>

                </div>
                <button
                    class="btn btn-primary btn-block"
                    id="registerButton"
                    type="submit"
                >
                    Create Account
                </button>
            </form>
            <p class="switch-auth">
                Already have an account?
                <a href="login.html">
                    Sign In
                </a>
            </p>
        </div>
    </div>
</div>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
