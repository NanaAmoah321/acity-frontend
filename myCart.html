    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
</head>
<body>
    <nav>

        <div class="logo">
            <img
                src="images/acity_new_logo-removebg-preview.png"
                alt="acity logo"
            >
        </div>

        <button id="menu-toggle" class="menu-toggle">

        <span></span>
        <span></span>
        <span></span>

        </button>

        <div class="nav-links" id="navLinks">

    <a href="index.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span class="menu-label">Home</span>
    </a>        
    
    <a href="marketplace.html" class="nav-item">
    <i class="fa-solid fa-store"></i>
    <span class="menu-label">Marketplace</span>
    </a>

    <a href="login.html" class="nav-item">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span class="menu-label">Login</span>
    </a>

    <a href="register.html" class="nav-item">
        <i class="fa-solid fa-user-plus"></i>
        <span class="menu-label">Register</span>
    </a>

    <a href="profile.html" class="nav-item">
        <i class="fa-solid fa-user"></i>
        <span class="menu-label">Profile</span>
    </a>

    <a href="inbox.html" class="nav-item">
        <i class="fa-solid fa-comments"></i>
        <span class="menu-label">Inbox</span>
        <small id="messageCount"></small>
    </a>

    <a href="create-listing.html" class="nav-item">
        <i class="fa-solid fa-plus"></i>
        <span class="menu-label">Add Item</span>
    </a>

    <a href="services.html" class="nav-item">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <span class="menu-label">Skills Connect</span>
    </a>

    <a href="#" onclick="logout()" class="nav-item">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span class="menu-label">Logout</span>
    </a>

    <a 
       href="admin.html"
       class="nav-item"
       id="adminLink"
       style="display: none;">
        <i class="fa-solid fa-shield-halved"></i>
        <span class="menu-label">Admin</span>
    </a>

    <a href="myCart.html" class="nav-item">
    <i class="fa-solid fa-cart-shopping"></i>
    <span class="menu-label">My Cart</span>
    </a>

    </div>

    </nav>
    <section class="cart-section">
        <h2>My Cart</h2>
        <div id="interestedContainer"></div>
    </section>
    
    <div id="checkoutModal" class="checkout-modal">

        <div class="checkout-content">

        <h2>Checkout</h2>

        <div class="checkout-product">

            <img
                id="checkoutImage"
                src=""
            >

            <div>

                <h3 id="checkoutTitle">
                </h3>

                <p id="checkoutPrice">
                </p>

            </div>

        </div>

        <div class="delivery-options">

            <label class="delivery-card">

                <input
                    type="radio"
                    name="deliveryMethod"
                    value="room"
                >

                🏠

                <h3>Room Delivery</h3>

            </label>

            <label class="delivery-card">

                <input
                    type="radio"
                    name="deliveryMethod"
                    value="meetup"
                >

                🤝

                <h3>Meet Up</h3>

            </label>

        </div>

        <div id="deliveryFields"></div>
        

        <div class="checkout-summary">

            <p>
                Product:
                <span id="productTotal">
                    ₵0
                </span>
            </p>

            <p>
                Delivery:
                <span id="deliveryFee">
                    Free
                </span>
            </p>

            <hr>

            <h3>
                Total:
                <span id="grandTotal">
                    ₵0
                </span>
            </h3>

        </div>
        
        <div class="checkout-buttons">

            <button
                id="placeOrderBtn"
                class="place-order"
                onclick="placeOrder()"
                disabled
            >
                Place Order
            </button>

            <button
                class="cancel-order"
                onclick="closeCheckout()"
            >
                Cancel
            </button>

        </div>

        </div>

    </div>

    
    <script src="js/myCart.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>
