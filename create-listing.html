    <div class="form-container">
        <h2>Create a Listing</h2>

        <form id="ItemForm">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" placeholder="Enter Item Name" required>
            
            <label for="description">Description:</label>
            <textarea id="description" name="description" placeholder="Enter Item description" required></textarea>
            
            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="">Select category</option>
                <option value="Electronics">Electronics</option>
                <option value="Books">Books</option>
                <option value="Clothing">Clothing</option>
                <option value="Hostel Items">Hostel Items</option>
                <option value="Academic">Academic</option>
                <option value="Other">Other</option>
            </select>

            <label for="price">Price (₵):</label>
            <input
                type="number"
                id="price"
                name="price"
                placeholder="Enter price"
                required
            >
            <label for="status">Status:</label>
            <select id="status" name="status">
                <option value="available">Available</option>
                <option value="sold">Sold</option>
                <option value="swapped">Swapped</option>
            </select>

            <label for="image_url">Image URL:</label>
            <input
                type="text"
                id="image_url"
                name="image_url"
                placeholder="Paste image URL"
            >
            <button class="Add-button" type="submit">Create Item</button>
        </form>
    </div>
