<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Item - Acity connect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <img src="images/acity_new_logo-removebg-preview.png" alt="acity logo" width="50px">
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
            <a href="profile.html">Profile</a>
            <a href="myCart.html">My Cart</a>

        </div>
    </nav>

    <div class="form-container">
        <h2>Create a Listing</h2>

        <form id="ItemForm">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" placeholder="Enter Item Name" required>
            
            <label for="description">Description:</label>
            <textarea id="description" name="description" placeholder="Enter Item description" required></textarea>
            
            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="">Select category</option>
                <option value="Items">Items</option>
                <option value="Skills">Skills</option>
            </select>
            <label for="status">Status:</label>
            <select id="status" name="status">
                <option value="available">Available</option>
                <option value="sold">Sold</option>
                <option value="swapped">Swapped</option>
            </select>
            <button class="Add-button" type="submit">Create Item</button>
        </form>
    </div>
    <script src="js/listings.js"></script>
</body>
</html>
