<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->

    <script>
    window.dataLayer = window.dataLayer || [];

    gtag('config', 'G-B940J1CYHZ');

    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="any">
    <link rel="apple-touch-icon" href="/favicon.png">
</head>
<body class="auth-pages-background">
<div class="auth-page">
    <div class="auth-left">
        <img
            src="images/acity_new_logo-removebg-preview.png"
            class="auth-logo"
        >
        <h1>
            Forgot Password?
        </h1>
        <p class="auth-subtitle">
        Enter your Academic City email and we'll send
        you a secure password reset link.
        </p>
        <div class="auth-features">
            <div>
                <i class="fa-solid fa-lock"></i>
                Secure password reset
            </div>
            <div>
                <i class="fa-solid fa-envelope"></i>
                Reset link sent instantly
            </div>
            <div>
                <i class="fa-solid fa-shield-halved"></i>
                Your account stays protected
            </div>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-card">
            <h2>
                Reset Password
            </h2>
            <p>
                Enter your Academic City email.
            </p>
            <form id="forgotPasswordForm"  class="form">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input
                        type="email"
                        id="email"
                        placeholder="student@acity.edu.gh"
                        required
                    >
                </div>
                <button
                    class="btn btn-primary btn-block"
                    type="submit"
                >
                    <i class="fa-solid fa-paper-plane"></i>
                    Send Reset Link
                </button>
            </form>
            <a
                href="login.html"
                class="btn btn-secondary btn-block"
            >
                <i class="fa-solid fa-arrow-left"></i>
                Back to Login
            </a>
        </div>
    </div>
</div>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
