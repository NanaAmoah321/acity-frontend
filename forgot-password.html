<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Forgot Password</title>

    <link rel="stylesheet" href="css/style.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

</head>

<body class="auth-pages-background">

<div class="auth-page">

    <div class="auth-left">

        <img
            src="images/acity_new_logo-removebg-preview.png"
            class="auth-logo"
        >

        <h1>

            Forgot Password?

        </h1>

        <p class="auth-subtitle">

            Don't worry.

            We'll help you get back into your account.

        </p>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>

                Reset Password

            </h2>

            <p>

                Enter your Academic City email.

            </p>

            <form id="forgotPasswordForm">

                <div class="input-group">

                    <i class="fa-solid fa-envelope"></i>

                    <input

                        type="email"

                        id="email"

                        placeholder="student@acity.edu.gh"

                        required

                    >

                </div>

                <button
                    class="auth-btn"
                    type="submit"
                >

                    Send Reset Link

                </button>

            </form>

            <p class="switch-auth">

                Remember your password?

                <a href="login.html">

                    Login

                </a>

            </p>

        </div>

    </div>

</div>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>

</body>

</html>
