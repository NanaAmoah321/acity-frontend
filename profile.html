<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Acity Connect</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <nav>
        <div class="logo">
            <img src="images/acity_new_logo-removebg-preview.png" alt="acity logo" width="50px">
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
            <a href="create-listing.html"> Add Item</a>
            <a href="myCart.html">My Cart</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>My Profile</h2>
        <p>Welcome to your profile page</p>

        <p><strong>Name:</strong> <span id="userName"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>

        <h3>Skills Offered</h3>
        <input type="text" id="skillsOffered" placeholder="eg. Programming">
        <h3>Skills Needed</h3>
        <input type="text" id="skillsNeeded" placeholder="eg. web design">

        <button class="login-register" onclick="saveProfile()">
            Save Profile
        </button>

    </div>

    <section class="ItemsContainer">
        <h2>My Items</h2>
        <div id="ItemsContainer">
            
        </div>

    </section>

    <script src="js/profile.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
