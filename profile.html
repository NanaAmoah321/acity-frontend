    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <nav>

            <img
                src="images/acity_new_logo-removebg-preview.png"
                alt="acity logo"
            >
        </div>

        <button id="menu-toggle" class="menu-toggle">

        <span></span>
        <span></span>
        <span></span>

        </button>

        <div class="nav-links" id="navLinks">

    <a href="index.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span class="menu-label">Home</span>
    </a>        
    
    <a href="marketplace.html" class="nav-item">
    <i class="fa-solid fa-store"></i>
    <span class="menu-label">Marketplace</span>
    </a>

    <a href="login.html" class="nav-item">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span class="menu-label">Login</span>
    </a>

    <a href="register.html" class="nav-item">
        <i class="fa-solid fa-user-plus"></i>
        <span class="menu-label">Register</span>
    </a>

    <a href="profile.html" class="nav-item">
        <i class="fa-solid fa-user"></i>
        <span class="menu-label">Profile</span>
    </a>

    <a href="inbox.html" class="nav-item">
        <i class="fa-solid fa-comments"></i>
        <span class="menu-label">Inbox</span>
        <small id="messageCount"></small>
    </a>

    <a href="notifications.html" class="nav-item">
    <i class="fa-solid fa-bell"></i>
    <span class="menu-label">Notifications</span>
    <small id="notificationCount"></small>
    </a>

    <a href="create-listing.html" class="nav-item">
        <i class="fa-solid fa-plus"></i>
        <span class="menu-label">Add Item</span>
    </a>

    <a href="services.html" class="nav-item">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <span class="menu-label">Skills Connect</span>
    </a>

    <a href="#" onclick="logout()" class="nav-item">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span class="menu-label">Logout</span>
    </a>

    <a 
       href="admin.html"
       class="nav-item"
       id="adminLink"
       style="display: none;">
        <i class="fa-solid fa-shield-halved"></i>
        <span class="menu-label">Admin</span>
    </a>

    <a href="myCart.html" class="nav-item">

    <i class="fa-solid fa-cart-shopping"></i>

    <span class="menu-label">
        My Cart
    </span>

    <small id="cartCount"></small>

   </a>

    </div>

    </nav>

    <section class="profile-hero">

    <div class="profile-hero-content">

        <div class="profile-avatar-large">

            <i class="fa-solid fa-user"></i>

        </div>

        <span class="profile-role">

            Student Marketplace Seller

        </span>

        <h1 id="userName"></h1>

        <p id="userEmail"></p>

        <div class="profile-meta">

    <span>

        <i class="fa-solid fa-graduation-cap"></i>

        Level 300

    </span>

    <span>

        <i class="fa-solid fa-location-dot"></i>

        Academic City

    </span>

        </div>



        <button class="btn btn-primary">

            <i class="fa-solid fa-pen"></i>

            Edit Profile

        </button>

    </div>

</section>

    <section class="profile-main">

    <section class="profile-summary">

        <div class="profile-left">

            <div class="profile-avatar-large">
                <i class="fa-solid fa-user"></i>
            </div>

            <div>

                <h1 id="userName"></h1>

                <p id="userEmail"></p>

                <div class="profile-info">

                <textarea
                    id="aboutMe"
                    placeholder="Tell other students about yourself..."
                ></textarea>

                <button
                    class="btn btn-primary"
                    onclick="saveProfile()"
                >
                    <i class="fa-solid fa-floppy-disk"></i>
                    Save Profile
                </button>

                </div>

            </div>

        </div>

        <div class="profile-stats">

            <div class="stat-card">
                <h2 id="itemsCount">0</h2>
                <p>Listings</p>
            </div>

            <div class="stat-card">
                <h2 id="ratingValue">0.0</h2>
                <p>Rating</p>
            </div>

            <div class="stat-card">
                <h2 id="reviewsCount">0</h2>
                <p>Reviews</p>
            </div>

        </div>

    </section>

    <div class="profile-grid">

        <section class="dashboard-panel">

            <div class="panel-header">

                <h2>My Listings</h2>

                <a href="#">View All</a>

            </div>

            <div
                id="myItemsContainer"
                class="listings-grid"
            ></div>

        </section>

        <section class="dashboard-panel">

            <div class="panel-header">

                <h2>Incoming Orders</h2>

                <a href="#">View All</a>

            </div>

            <div
                id="sellerOrders"
                class="orders-list"
            ></div>

        </section>

    </div>

    <section class="dashboard-panel reviews-panel">

        <div class="panel-header">

            <h2>Reviews</h2>

        </div>

        <div id="reviewsContainer"></div>

    </section>

</section>

        

    </section>

    

    

    <script src="js/toast.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/reviews.js"></script>
    <script type="module" src="js/navbar.js"></script>
    
</body>
</html>
