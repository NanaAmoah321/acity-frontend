<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Acity Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <nav>

        <div class="logo">
            <img
                src="images/acity_new_logo-removebg-preview.png"
                alt="acity logo"
            >
        </div>

        <button id="menu-toggle" class="menu-toggle">

        <span></span>
        <span></span>
        <span></span>

        </button>

        <div class="nav-links" id="navLinks">

    <a href="index.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span class="menu-label">Home</span>
    </a>        
    
    <a href="marketplace.html" class="nav-item">
    <i class="fa-solid fa-store"></i>
    <span class="menu-label">Marketplace</span>
    </a>

    <a href="login.html" class="nav-item">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span class="menu-label">Login</span>
    </a>

    <a href="register.html" class="nav-item">
        <i class="fa-solid fa-user-plus"></i>
        <span class="menu-label">Register</span>
    </a>

    <a href="profile.html" class="nav-item">
        <i class="fa-solid fa-user"></i>
        <span class="menu-label">Profile</span>
    </a>

    <a href="inbox.html" class="nav-item">
        <i class="fa-solid fa-comments"></i>
        <span class="menu-label">Inbox</span>
        <small id="messageCount"></small>
    </a>

    <a href="notifications.html" class="nav-item">
    <i class="fa-solid fa-bell"></i>
    <span class="menu-label">Notifications</span>
    <small id="notificationCount"></small>
    </a>

    <a href="create-listing.html" class="nav-item">
        <i class="fa-solid fa-plus"></i>
        <span class="menu-label">Add Item</span>
    </a>

    <a href="services.html" class="nav-item">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <span class="menu-label">Skills Connect</span>
    </a>

    <a href="#" onclick="logout()" class="nav-item">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span class="menu-label">Logout</span>
    </a>

    <a 
       href="admin.html"
       class="nav-item"
       id="adminLink"
       style="display: none;">
        <i class="fa-solid fa-shield-halved"></i>
        <span class="menu-label">Admin</span>
    </a>

    <a href="myCart.html" class="nav-item">

    <i class="fa-solid fa-cart-shopping"></i>

    <span class="menu-label">
        My Cart
    </span>

    <small id="cartCount"></small>

   </a>

    </div>

    </nav>

    <section class="profile-dashboard">

        <section class="profile-sidebar">

            <div class="profile-cover"></div>

            <div class="profile-header">

                <div class="profile-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>

                <span class="profile-tag">
                    Student Seller
                </span>

                <h1 id="userName"></h1>

                <p id="userEmail"></p>

            </div>

            <div class="profile-stats">

            <div class="stat-card">
                <span id="itemsCount">0</span>
                <small>Listings</small>
            </div>

            <div class="stat-card">
                <span id="reviewsCount">0</span>
                <small>Reviews</small>
            </div>

            <div class="stat-card">
                <span id="ratingValue">0.0</span>
                <small>Rating</small>
            </div>

            </div>

            <div class="skills-section">

            <label>
            <i class="fa-solid fa-code"></i>
            Skills Offered
            </label>

            <input
            type="text"
            id="skillsOffered"
            placeholder="Programming, Graphic Design..."
            >

            <label>
            <i class="fa-solid fa-lightbulb"></i>
            Skills Needed
            </label>

            <input
            type="text"
            id="skillsNeeded"
            placeholder="Web Design, UI/UX..."
            >

            </div>

            <button
            class="save-profile-btn"
            onclick="saveProfile()"
            >
            <i class="fa-solid fa-floppy-disk"></i>
            Save Changes
            </button>

            <div class="profile-achievements">

                <h3>
                    <i class="fa-solid fa-trophy"></i>
                    Achievements
                </h3>

                <div class="achievement-badge">
                    🏪 First Listing
                </div>

                <div class="achievement-badge">
                    ⭐ 5 Star Seller
                </div>

                <div class="achievement-badge">
                    📦 Order Completed
                </div>

                <div class="achievement-badge">
                    💬 Active Seller
                </div>

            </div>

        </section>

        <div class="profile-right">

        <section class="my-items-section">

            <h2>My Items</h2>

            <div id="myItemsContainer"></div>

        </section>
        <section class="incoming-orders-section">

        <h2>Incoming Orders</h2>

        <div id="sellerOrders"></div>

        </section>

        <section class="profile-reviews-section">

        <h2>Reviews</h2>

        <div id="ratingContainer"></div>

        <div id="reviewsContainer"></div>

         </section>

        </div>

    </section>

    

    

    <script src="js/toast.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/reviews.js"></script>
    <script type="module" src="js/navbar.js"></script>
    
</body>
</html>
