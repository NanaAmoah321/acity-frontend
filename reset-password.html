<!DOCTYPE html>
<html lang="en">
<head>

    <script>
    window.dataLayer = window.dataLayer || [];

    gtag('config', 'G-B940J1CYHZ');

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/toast.css">
</head>
<body class="auth-pages-background">
<div class="auth-page">
<div class="auth-left">
<img
src="images/acity_new_logo-removebg-preview.png"
class="auth-logo"
>
<h1>
Create New Password
</h1>
<p class="auth-subtitle">
Create a strong password to keep your
Acity Connect account secure.
</p>
<div class="auth-features">
    <div>
        <i class="fa-solid fa-lock"></i>
        Strong password protection
    </div>
    <div>
        <i class="fa-solid fa-shield-halved"></i>
        Secure encrypted account
    </div>
    <div>
        <i class="fa-solid fa-user-check"></i>
        Safe access to your profile
    </div>
</div>
</div>
<div class="auth-right">
<div class="auth-card">
<h2>
New Password
</h2>
<form id="resetPasswordForm" class="form">
<div class="input-group">
    <i class="fa-solid fa-lock"></i>
    <input
        type="password"
        id="password"
        placeholder="New Password"
        required
    >
    <div
    id="passwordStrength"
    class="password-strength"
    ></div>
    <button
        type="button"
        class="toggle-password"
    >
        <i class="fa-solid fa-eye"></i>
    </button>
</div>
<div class="input-group">
    <i class="fa-solid fa-lock"></i>
    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required
    >
    <button
        type="button"
        class="toggle-password"
    >
        <i class="fa-solid fa-eye"></i>
    </button>
</div>
</form>
<div class="form-footer">
    Remembered your password?
    <a href="login.html">
        Sign In
    </a>
</div>
</div>
</div>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
