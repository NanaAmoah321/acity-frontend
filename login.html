<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Acity Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
</head>
<body class="auth-pages-background">


<div class="floating-blob blob-1"></div>
<div class="floating-blob blob-2"></div>
<div class="floating-blob blob-3"></div>

<div class="auth-page">

    <div class="auth-left">

        <img
            src="images/acity_new_logo-removebg-preview.png"
            class="auth-logo"
            alt="Acity Connect"
        >

        <h1>
            Welcome Back 
        </h1>

        <p class="auth-subtitle">

            Buy. Sell. Learn. Connect.

        </p>

        <div class="auth-features">

            <div>
                <i class="fa-solid fa-store"></i>
                Campus Marketplace
            </div>

            <div>
                <i class="fa-solid fa-screwdriver-wrench"></i>
                Skills Connect
            </div>

            <div>
                <i class="fa-solid fa-comments"></i>
                Student Messaging
            </div>

            <div>
                <i class="fa-solid fa-shield-halved"></i>
                Safe Campus Trading
            </div>

        </div>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>Sign In</h2>

            <p>

                Sign in to continue to Acity Connect.

            </p>

            <form id="loginForm">

                <div class="input-group">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="student@acity.edu.gh"
                        required
                    >

                </div>

                <div class="input-group">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                    >

                    <button
                        type="button"
                        class="toggle-password"
                    >

                        <i 
                            id="togglePasswordIcon"    
                            class="fa-solid fa-eye"
                        ></i>

                    </button>

                </div>

                <div class="auth-options">

                    <label>

                        <input type="checkbox">

                        Remember me

                    </label>

                    <a href="forgot-password.html">

                        Forgot Password?

                    </a>

                </div>

                <button
                    class="auth-btn"
                    id="loginButton"
                    type="submit"
                >
                    <span>

                        Sign In
                    
                    </span>
                    

                </button>

            </form>

            <p class="switch-auth">

                Don't have an account?

                <a href="register.html">

                    Create one

                </a>

            </p>

        </div>

    </div>

</div>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>

    
</body>
</html>
