<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACity Connect - notifications</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<nav>

        <div class="logo">
            <img
                src="images/acity_new_logo-removebg-preview.png"
                alt="acity logo"
            >
        </div>

        <button id="menu-toggle" class="menu-toggle">

        <span></span>
        <span></span>
        <span></span>

        </button>

        <div class="nav-links" id="navLinks">

    <a href="index.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span class="menu-label">Home</span>
    </a>        
    
    <a href="marketplace.html" class="nav-item">
    <i class="fa-solid fa-store"></i>
    <span class="menu-label">Marketplace</span>
    </a>

    <a href="login.html" class="nav-item">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span class="menu-label">Login</span>
    </a>

    <a href="register.html" class="nav-item">
        <i class="fa-solid fa-user-plus"></i>
        <span class="menu-label">Register</span>
    </a>

    <a href="profile.html" class="nav-item">
        <i class="fa-solid fa-user"></i>
        <span class="menu-label">Profile</span>
    </a>

    <a href="inbox.html" class="nav-item">
        <i class="fa-solid fa-comments"></i>
        <span class="menu-label">Inbox</span>
        <small id="messageCount"></small>
    </a>

    <a href="create-listing.html" class="nav-item">
        <i class="fa-solid fa-plus"></i>
        <span class="menu-label">Add Item</span>
    </a>

    <a href="services.html" class="nav-item">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <span class="menu-label">Skills Connect</span>
    </a>

    <a href="#" onclick="logout()" class="nav-item">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span class="menu-label">Logout</span>
    </a>

    <a 
       href="admin.html"
       class="nav-item"
       id="adminLink"
       style="display: none;">
        <i class="fa-solid fa-shield-halved"></i>
        <span class="menu-label">Admin</span>
    </a>

    <a href="myCart.html" class="nav-item">
    <i class="fa-solid fa-cart-shopping"></i>
    <span class="menu-label">My Cart</span>
    <small id="cartCount"></small>
    </a>

    </div>

    </nav>

    <div class="notifications-page">

    <div class="notifications-header">

    <div>

        <h1>🔔 Notifications</h1>

        <p>
            Stay updated with everything happening on Acity Connect.
        </p>

    </div>

    <button class="mark-read-btn">

        ✔ Mark all read

    </button>

    </div>

    <div class="notification-filters">

    <button class="notification-filter active" data-filter="all">
        All
    </button>

    <button class="notification-filter" data-filter="order">
        Orders
    </button>

    <button class="notification-filter" data-filter="message">
        Messages
    </button>

    <button class="notification-filter" data-filter="review">
        Reviews
    </button>

    <button class="notification-filter" service>
        Services
    </button>

    </div>

    <div id="notificationsContainer"></div>

    </div>

    
<script src="js/notifications.js"></script>
<script type="module" src="js/navbar.js"></script>


</body>
